  cards:[
    {topic:'Basic EPS',q:'Basic EPS kaise calculate karte hain?',a:`<div class="formula">BASIC EPS =<br>Net Profit attributable to Equity Shareholders<br>──────────────────────────────────────────<br>Weighted Average Number of Equity Shares<br><br>Numerator = PAT – Preference Dividend<br>             – Reserve created by entity (not deducted)<br>             – Dividend Distribution Tax (DDT no longer applicable)</div><div class="note">Note: Corporate Dividend Tax / DDT not applicable now (post Oct 2019)</div>`,type:'formula'},
    {topic:'Weighted Average Shares',q:'Weighted Average Shares kaise calculate karte hain?',a:`<strong>Outstanding Shares</strong> = Issued and subscribed shares<br><strong>Weighted Average</strong> = Consider TIME as weight<div class="formula">Example:<br>Jan 1: 10,000 shares outstanding<br>Apr 1: 2,000 new shares issued<br><br>WA = (10,000 × 12/12) + (2,000 × 9/12)<br>   = 10,000 + 1,500 = 11,500</div>`,type:'formula'},
    {topic:'Bonus Issue',q:'Bonus Issue ke shares ko weighted average mein kaise treat karte hain?',a:`<strong>Bonus Issue:</strong> Date is NOT relevant. Consider bonus shares as if issued from the <span class="highlight">BEGINNING OF THE PERIOD</span>.<br><br>Also: If bonus issue is announced after year end but before FS approval → Restate EPS for ALL PRIOR PERIODS presented.<div class="note">Bonus = FREE shares; no consideration → treat as full year!</div>`,type:'rule',mnemonic:'Bonus = Pura Saal! No time weighting'},
    {topic:'Right Issue',q:'Right Issue ka EPS calculation mein special treatment kya hai?',a:`Right Issue has TWO components:<div class="formula">(A) BONUS PORTION:<br>   = Bonus element in right issue<br>   Treated as bonus shares from beginning of period<br><br>(B) FRESH ISSUE PORTION:<br>   = Balance of right issue<br>   Time weighted from date consideration receivable</div><br>Theoretical Ex-Rights Price = <br>(Shares before rights × Market Price + New shares × Exercise Price) ÷ Total shares after rights`,type:'formula'},
    {topic:'Diluted EPS',q:'Diluted EPS kya hai? Basic EPS se kaise differ karta hai?',a:`<strong>Diluted EPS</strong> = Shows EPS assuming all potential equity shares (dilutive instruments) were converted:<div class="formula">Diluted EPS = Adjusted Net Profit ÷ Adjusted Weighted Avg Shares<br><br>Adjusted Net Profit = Basic EPS numerator<br>   + Interest saved on convertible debt (net of tax)<br>   + Other adjustments<br><br>Adjusted Shares = Basic WA Shares<br>   + Potential shares from convertibles, options, warrants</div><div class="note">Diluted EPS ≤ Basic EPS (always)</div>`,type:'formula'}
  ]

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let state = {
  activeChapter: 0,
  showCover: true,
  cardIndex: 0,
  filter: 'all',
  flipped: false,
  markedCards: JSON.parse(localStorage.getItem('acct_marked') || '[]'),
  doneCards: JSON.parse(localStorage.getItem('acct_done') || '[]'),
};

function getFilteredCards() {
  const ch = CHAPTERS[state.activeChapter];
  let cards = ch.cards;
  if (state.filter === 'marked') return cards.filter((_,i) => state.markedCards.includes(`${state.activeChapter}-${i}`));
  if (state.filter === 'all') return cards;
  return cards.filter(c => c.type === state.filter || (state.filter === 'mnemonic' && c.mnemonic));
}

function cardKey(ci) { return `${state.activeChapter}-${ci}`; }

/* ════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════ */
function render() {
  renderTabs();
  renderMainContent();
  updateStats();
}

function renderTabs() {
  const tabs = document.getElementById('chapterTabs');
  tabs.innerHTML = CHAPTERS.map((ch, i) => `
    <button class="ch-tab ${i===state.activeChapter?'active':''}" onclick="selectChapter(${i})" style="--ch-color:${ch.color}">
      Ch ${ch.no} · ${ch.title.length > 22 ? ch.title.substring(0,22)+'…' : ch.title}
    </button>
  `).join('');
}

function renderMainContent() {
  const cont = document.getElementById('mainContent');
  cont.innerHTML = '';
  if (state.showCover) {
    cont.innerHTML = renderCover();
  } else {
    cont.innerHTML = renderCardArea();
  }
  updateProgress();
}

function renderCover() {
  const ch = CHAPTERS[state.activeChapter];
  const qr = ch.quickRef;
  return `
  <div class="chapter-cover active">
    <div class="cover-card" style="border-top:3px solid ${ch.color}">
      <div class="cover-label" style="color:${ch.color}">Chapter ${ch.no} · ${ch.pageRef}</div>
      <div class="cover-title">${ch.title}</div>
      <div class="cover-subtitle">${ch.subtitle}</div>
      <div class="cover-meta">
        <span class="meta-pill" style="color:${ch.color};border-color:${ch.color}30;background:${ch.color}10">${ch.cards.length} Flashcards</span>
        <span class="meta-pill" style="color:#6b7280;border-color:#252b3b">${ch.pageRef}</span>
      </div>
      <div class="cover-summary">
        <h4>📋 Chapter Summary</h4>
        <p>${ch.summary}</p>
      </div>
      <div class="cover-key-points">
        <h4 style="font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;color:${ch.color};margin-bottom:8px">⭐ Key Points to Remember</h4>
        ${ch.keyPoints.map(kp => `<div class="cover-kp">${kp}</div>`).join('')}
      </div>
      ${qr ? `
      <div class="qr-section">
        <div class="qr-title">📊 Quick Reference Table</div>
        <table class="qr-table">
          <thead><tr>${qr[0].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${qr.slice(1).map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>` : ''}
      <button class="start-btn" onclick="startCards()" style="background:${ch.color}">
        Start Flashcards →
      </button>
    </div>
  </div>`;
}

function renderCardArea() {
  const ch = CHAPTERS[state.activeChapter];
  const cards = getFilteredCards();
  if (cards.length === 0) {
    return `<div class="card-area active"><div class="empty-state"><div class="icon">🔍</div><p>No cards match this filter.</p><button class="ctrl-btn" onclick="setFilter('all',null)">Show All Cards</button></div></div>`;
  }
  const ci = Math.min(state.cardIndex, cards.length - 1);
  const card = cards[ci];
  const globalIdx = ch.cards.indexOf(card);
  const marked = state.markedCards.includes(cardKey(globalIdx));
  return `
  <div class="card-area active">
    <div class="card-count">Card <strong style="color:var(--accent)">${ci+1}</strong> of ${cards.length} · <span style="color:var(--muted)">${ch.title}</span></div>
    <div class="flip-wrapper" onclick="flipCard()">
      <div class="flip-inner ${state.flipped?'flipped':''}" id="flipInner">
        <div class="flip-face flip-front">
          <div class="card-topic-tag">${card.topic}</div>
          <div class="card-q">${card.q}</div>
          <div class="flip-hint">Click card to reveal answer · <span>Space</span> to flip</div>
        </div>
        <div class="flip-face flip-back">
          <div class="card-topic-tag" style="background:rgba(59,130,246,.15);color:var(--accent2)">${card.topic} · Answer</div>
          <div class="card-answer">${card.a}${card.mnemonic?`<div class="mnemonic-box"><strong>🧠 Mnemonic:</strong> ${card.mnemonic}</div>`:''}</div>
        </div>
      </div>
    </div>
    <div class="card-controls">
      <button class="ctrl-btn btn-prev" onclick="prevCard()">← Prev</button>
      <button class="ctrl-btn btn-mark ${marked?'marked':''}" onclick="toggleMark(${globalIdx})">
        ${marked?'★ Marked':'☆ Mark'}
      </button>
      <button class="ctrl-btn btn-flip" onclick="flipCard()">Flip Card</button>
      <button class="ctrl-btn btn-next" onclick="nextCard()">Next →</button>
    </div>
    <div class="rating-row">
      <button class="rate-btn rate-easy" onclick="rateCard(${globalIdx},'easy')">✅ Easy</button>
      <button class="rate-btn rate-review" onclick="rateCard(${globalIdx},'review')">🔄 Review</button>
      <button class="rate-btn rate-hard" onclick="rateCard(${globalIdx},'hard')">❌ Hard</button>
      <button class="ctrl-btn" onclick="goToCover()" style="font-size:.75rem;padding:7px 12px">📋 Cover</button>
    </div>
    <div class="kb-hint"><kbd>←</kbd> Prev &nbsp; <kbd>Space</kbd> Flip &nbsp; <kbd>→</kbd> Next</div>
  </div>`;
}

function updateProgress() {
  const ch = CHAPTERS[state.activeChapter];
  const cards = getFilteredCards();
  const ci = Math.min(state.cardIndex, cards.length - 1);
  const pct = cards.length > 0 ? Math.round((ci+1)/cards.length*100) : 0;
  document.getElementById('progressText').textContent = `Card ${ci+1} of ${cards.length}`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pctText').textContent = pct + '%';
}

function updateStats() {
  let total = CHAPTERS.reduce((a,c)=>a+c.cards.length,0);
  document.getElementById('totalCards').textContent = total;
  document.getElementById('doneCards').textContent = state.doneCards.length;
  document.getElementById('markedCount').textContent = state.markedCards.length;
}

/* ════════════════════════════════════════════════
   ACTIONS
════════════════════════════════════════════════ */
function selectChapter(i) {
  state.activeChapter = i;
  state.showCover = true;
  state.cardIndex = 0;
  state.flipped = false;
  render();
}

function startCards() {
  state.showCover = false;
  state.cardIndex = 0;
  state.flipped = false;
  render();
}

function goToCover() {
  state.showCover = true;
  state.flipped = false;
  render();
}

function flipCard() {
  state.flipped = !state.flipped;
  const inner = document.getElementById('flipInner');
  if (inner) inner.className = 'flip-inner ' + (state.flipped ? 'flipped' : '');
}

function nextCard() {
  const cards = getFilteredCards();
  const ch = CHAPTERS[state.activeChapter];
  const card = cards[state.cardIndex];
  if (card) {
    const gi = ch.cards.indexOf(card);
    if (!state.doneCards.includes(`${state.activeChapter}-${gi}`)) {
      state.doneCards.push(`${state.activeChapter}-${gi}`);
      localStorage.setItem('acct_done', JSON.stringify(state.doneCards));
    }
  }
  if (state.cardIndex < cards.length - 1) {
    state.cardIndex++;
    state.flipped = false;
    renderMainContent();
    updateStats();
  } else {
    // Last card → next chapter cover or loop
    if (state.activeChapter < CHAPTERS.length - 1) {
      const msg = confirm('Chapter complete! ✅ Go to next chapter?');
      if (msg) selectChapter(state.activeChapter + 1);
    } else {
      alert('🎉 You\'ve completed all chapters! Great revision!');
    }
  }
}

function prevCard() {
  if (state.cardIndex > 0) {
    state.cardIndex--;
    state.flipped = false;
    renderMainContent();
  }
}

function toggleMark(globalIdx) {
  const key = cardKey(globalIdx);
  const idx = state.markedCards.indexOf(key);
  if (idx > -1) state.markedCards.splice(idx, 1);
  else state.markedCards.push(key);
  localStorage.setItem('acct_marked', JSON.stringify(state.markedCards));
  renderMainContent();
  updateStats();
}

function rateCard(globalIdx, rating) {
  // Visual feedback
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = rating === 'easy' ? '✅ Got it!' : rating === 'hard' ? '❌ Need Practice' : '🔄 Queued';
  setTimeout(() => {
    btn.textContent = orig;
    nextCard();
  }, 400);
}

function setFilter(f, el) {
  state.filter = f;
  state.cardIndex = 0;
  state.flipped = false;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderMainContent();
}

/* ════════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (state.showCover) return;
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
